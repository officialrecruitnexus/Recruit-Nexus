<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Recruit Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body.login-page {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('Background.jpg') !important;
            background-size: cover !important;
            background-position: center;
            font-family: 'Poppins', sans-serif;
        }

        .login-card {
            background: rgba(40, 40, 40, 0.45); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 45px 40px;
            width: 400px;
            text-align: center;
            color: rgb(18, 184, 79);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .login-card h2 { color: rgb(11, 149, 43); margin-bottom: 5px; font-weight: 600; }
        .login-card h2 span { color: #28a745; }
        .subtitle { color: #1c7632; font-size: 14px; margin-bottom: 30px; }
        .input-group { width: 100%; text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; color: #28a745; font-size: 14px; margin-bottom: 8px; font-weight: 400; }

        .modern-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 14px;
            border-radius: 10px;
            color: white;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .modern-input:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #28a745;
        }

        .login-btn {
            width: 100%;
            background: #28a745;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover { 
            background: #218838; 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }

        .login-btn:disabled { background: #555; cursor: not-allowed; }

        a {
            color: #00d4ff;
            text-decoration: none;
            transition: 0.3s;
        }

        a:hover {
            text-decoration: underline;
        }

        ::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body class="login-page">

    <div class="login-card">
        <h2>Recruit <span>Nexus</span></h2>
        <p class="subtitle">Welcome back! Please login to your account.</p>

        <form id="loginForm" style="width: 100%;">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" class="modern-input" placeholder="example@gmail.com" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="loginPassword" class="modern-input" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">Login Now</button>
            
            <p style="margin-top: 20px; font-size: 14px;">
                Don't have an account? <a href="register.html" style="color: #00d4ff; text-decoration: none;">Register</a>
            </p>
        </form>
    </div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const loginBtn = document.getElementById('loginBtn');
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        loginBtn.innerText = "Checking...";
        loginBtn.disabled = true;

        try {
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const result = await response.json();

            if (response.ok) {
                localStorage.setItem("userEmail", email);
                
                if (result.role) {
                    localStorage.setItem("userRole", result.role);
                }
                
                window.location.href = result.redirectUrl; 
            } else {
    
                alert("Login Failed: " + result.message);
                
                loginBtn.innerText = "Login Now";
                loginBtn.disabled = false;
            }
        } catch (error) {
            console.error("Fetch Error:", error);
            alert("Server connection failed!");
            loginBtn.innerText = "Login Now";
            loginBtn.disabled = false;
        }
    });
</script>

</body>
</html>
